server.port=8082
spring.application.name=core-service

# Protegemos la base de datos del Core
spring.datasource.url=${DB_CORE_URL:jdbc:postgresql://localhost:5432/satsi_core_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:password_oculto}

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

