server.port=8081
spring.application.name=iam-service

# Si existe la variable DB_URL usa esa, si no, se conecta al localhost por defecto
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/satsi_iam_db}
# Ocultamos el usuario administrador de PostgreSQL
spring.datasource.username=${DB_USER:postgres}
# Ocultamos tu contraseña real de PostgreSQL
spring.datasource.password=${DB_PASSWORD:password_oculto}

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Ocultamos tu clave secreta de firma de Tokens JWT
jwt.secret=${JWT_SECRET:clave_secreta_super_larga_y_segura_para_desarrollo_wong_12345}