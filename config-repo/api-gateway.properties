server.port=8080
spring.application.name=api-gateway

# ----------------------------------------
# RUTA 1: Servicio de Identidad (Login/Registro)
# ----------------------------------------
spring.cloud.gateway.mvc.routes[0].id=iam-service
spring.cloud.gateway.mvc.routes[0].uri=http://localhost:8081
spring.cloud.gateway.mvc.routes[0].predicates[0]=Path=/auth/**

# ----------------------------------------
# RUTA 2: Servicio Central de Tickets
# ----------------------------------------
spring.cloud.gateway.mvc.routes[1].id=core-service
spring.cloud.gateway.mvc.routes[1].uri=http://localhost:8082
spring.cloud.gateway.mvc.routes[1].predicates[0]=Path=/api/**