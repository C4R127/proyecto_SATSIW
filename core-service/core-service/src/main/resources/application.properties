# 1. Puerto del servidor (iam-service usa 8081, este usará 8082)
server.port=8082
spring.application.name=core-service

# 2. Conexión a la nueva base de datos de tickets
spring.datasource.url=jdbc:postgresql://localhost:5432/satsi_core_db
spring.datasource.username=postgres
spring.datasource.password=12358c
spring.datasource.driver-class-name=org.postgresql.Driver

# 3. Configuración de Hibernate (para que cree las tablas automáticamente)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true